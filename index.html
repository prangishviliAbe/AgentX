<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentX</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #1e1e1e;
        color: #cccccc;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      #boot-error {
        display: none;
        padding: 32px;
        max-width: 640px;
      }
      #boot-error h1 {
        color: #fff;
        font-size: 18px;
        font-weight: 600;
      }
      #boot-error pre {
        background: #252526;
        border: 1px solid #3c3c3c;
        border-radius: 8px;
        padding: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div
        id="loading-splash"
        style="
          height: 100%;
          display: grid;
          place-items: center;
          color: #9d9d9d;
          font-size: 14px;
        "
      >
        Loading AgentX…
      </div>
    </div>
    <div id="boot-error">
      <h1>AgentX failed to start UI</h1>
      <pre id="boot-error-msg"></pre>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
